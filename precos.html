  <title>Tabela de preços</title>

  <style>
    html, body {

      padding: 0;
      background: #000;

    * {
      box-sizing: border-box;
    }

    .topbar {
      position: sticky;

      padding: 12px 16px;

      font-size: 14px;

      padding: 10px 14px;
      border-radius: 10px;
    }

    .section {
      position: relative;
      width: 100%;
      line-height: 0;
    }

    .section img {
      display: block;
      width: 100%;
      height: auto;
      border: 0;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }

    .hotspot {
      position: absolute;
      display: block;
      z-index: 50;
      background: rgba(0, 255, 0, 0.25);
      outline: 2px solid #ffffff;
      text-indent: -9999px;
      overflow: hidden;
      cursor: pointer;
    }

    .btn-social-midias {
      left: 14%;
      top: 75.4%;
      width: 72%;
      height: 13%;
    }
  </style>
</head>

<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet,noimageindex" />
  <title>Tabela de preços</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      width: 100%;
      overflow-x: hidden;
      scrollbar-color: #2b2b2b #000;
      scrollbar-width: thin;
    }

    * {
      box-sizing: border-box;
    }

    ::-webkit-scrollbar {
      width: 10px;
    }

    ::-webkit-scrollbar-track {
      background: #000;
    }

    ::-webkit-scrollbar-thumb {
      background: #2b2b2b;
      border-radius: 10px;
      border: 2px solid #000;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #3a3a3a;
    }

    .topbar {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 2000;
    }

    .back-link {
      display: inline-block;
      color: #fff;
      text-decoration: none;
      font-family: Arial, sans-serif;
      font-size: 14px;
      border: 1px solid rgba(255,255,255,0.22);
      padding: 10px 14px;
      border-radius: 10px;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(6px);
    }

    .section {
      position: relative;
      width: 100%;
      line-height: 0;
    }

    .section img {
      display: block;
      width: 100%;
      height: auto;
      border: 0;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }

    .hotspot {
      position: absolute;
      display: block;
      z-index: 999;
      background: rgba(255,255,255,0);
      outline: none;
      text-indent: -9999px;
      overflow: hidden;
      cursor: pointer;
    }

    .btn-social-midias {
      left: 16%;
      top: 79.1%;
      width: 69%;
      height: 13%;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <a class="back-link" href="index.html?restore=1">Voltar ao portfólio</a>
  </div>

  <div class="section">
    <img src="pagina-extra.jpg" alt="Tabela de preços" loading="eager">

    <a
      class="hotspot btn-social-midias"
      href="https://wa.me/5585985200377?text=Ol%C3%A1!%20Tudo%20bem%3F%0A%0AAcabei%20de%20ver%20seu%20portf%C3%B3lio%20e%20o%20seu%20trabalho%20se%20encaixa%20muito%20bem%20com%20o%20que%20estou%20buscando.%0A%0AEstou%20precisando%20de%20um%20designer%20para%20%5BDESCREVA%20SUA%20DEMANDA%20AQUI%20%5D.%20Voc%C3%AA%20teria%20disponibilidade%20para%20a%20gente%20conversar%3F"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="Solicitar orçamento personalizado para social mídia"
    >
      Solicitar orçamento personalizado para social mídia
    </a>
  </div>
</body>
</html>

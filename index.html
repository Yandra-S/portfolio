<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet,noimageindex" />
  <title>Portfólio</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      width: 100%;
      overflow-x: hidden;
      scrollbar-color: #2b2b2b #000;
      scrollbar-width: thin;
    }

    * {
      box-sizing: border-box;
    }

    ::-webkit-scrollbar {
      width: 10px;
    }

    ::-webkit-scrollbar-track {
      background: #000;
    }

    ::-webkit-scrollbar-thumb {
      background: #2b2b2b;
      border-radius: 10px;
      border: 2px solid #000;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #3a3a3a;
    }

    .wrap {
      width: 100%;
      margin: 0;
      padding: 0;
    }

    .section {
      position: relative;
      width: 100%;
      margin: 0;
      padding: 0;
      line-height: 0;
    }

    .section img {
      display: block;
      width: 100%;
      height: auto;
      margin: 0;
      padding: 0;
      border: 0;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }

    .hotspot {
      position: absolute;
      display: block;
      z-index: 999;
      background: rgba(255,255,255,0);
      outline: none;
      text-indent: -9999px;
      overflow: hidden;
      cursor: pointer;
    }

    .btn-precos {
      left: 61.5%;
      top: 92.6%;
      width: 37%;
      height: 1.8%;
    }

    .btn-whatsapp {
      left: 61.5%;
      top: 94.5%;
      width: 37%;
      height: 1.9%;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="section">
      <img src="pagina1.jpg" alt="Portfólio página 1" loading="eager">
    </div>

    <div class="section">
      <img src="pagina2.jpg" alt="Portfólio página 2" loading="lazy">
    </div>

    <div class="section">
      <img src="pagina3.jpg" alt="Portfólio página 3" loading="lazy">
    </div>

    <div class="section">
      <img src="pagina4.jpg" alt="Portfólio página 4" loading="lazy">
    </div>

    <div class="section">
      <img src="pagina5.jpg" alt="Portfólio página 5" loading="lazy">

      <a
        class="hotspot btn-precos"
        href="precos.html"
        aria-label="Ver tabela de preços"
        onclick="sessionStorage.setItem('portfolioScroll', String(window.scrollY));"
      >
        Ver tabela de preços
      </a>

      <a
        class="hotspot btn-whatsapp"
        href="https://wa.me/5585985200377?text=Ol%C3%A1!%20Tudo%20bem%3F%0A%0AAcabei%20de%20ver%20seu%20portf%C3%B3lio%20e%20o%20seu%20trabalho%20se%20encaixa%20muito%20bem%20com%20o%20que%20estou%20buscando.%0A%0AEstou%20precisando%20de%20um%20designer%20para%20%5BDESCREVA%20SUA%20DEMANDA%20AQUI%20%5D.%20Voc%C3%AA%20teria%20disponibilidade%20para%20a%20gente%20conversar%3F"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Falar no WhatsApp"
      >
        Falar no WhatsApp
      </a>
    </div>
  </div>

  <script>
    window.addEventListener('load', function () {
      const params = new URLSearchParams(window.location.search);
      const shouldRestore = params.get('restore') === '1';
      const savedScroll = sessionStorage.getItem('portfolioScroll');

      if (shouldRestore && savedScroll !== null) {
        const y = parseInt(savedScroll, 10);

        const restoreScroll = function () {
          window.scrollTo(0, y);
        };

        restoreScroll();
        setTimeout(restoreScroll, 150);
        setTimeout(restoreScroll, 500);
        setTimeout(restoreScroll, 1000);

        sessionStorage.removeItem('portfolioScroll');
        history.replaceState({}, document.title, window.location.pathname);
      }
    });
  </script>
</body>
</html>

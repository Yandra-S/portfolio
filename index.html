<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Portfólio</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      width: 100%;
      overflow-x: hidden;
    }

    * { box-sizing: border-box; }

    .wrap { width: 100%; }

    .section {
      position: relative;
      width: 100%;
      line-height: 0;
    }

    .section img {
      display: block;
      width: 100%;
      height: auto;
    }

    .hotspot {
      position: absolute;
      z-index: 999;
      background: transparent;
      cursor: pointer;
    }

    .btn-precos {
      left: 61.5%;
      top: 92.6%;
      width: 37%;
      height: 1.8%;
    }

    .btn-whatsapp {
      left: 61.5%;
      top: 94.5%;
      width: 37%;
      height: 1.9%;
    }
  </style>
</head>
<body>
  <div class="wrap" id="portfolioWrap"></div>

  <script>
    const imagens = [
      "./Página 1 - Final (1).jpg",
      "./Página 2 - Final (1).jpg",
      "./Página 3 - Final (1).jpg",
      "./Página 4 - Final (1).jpg",
      "./Página 5 - Final (1).jpg"
    ];

    const wrap = document.getElementById("portfolioWrap");

    imagens.forEach((src, index) => {
      const section = document.createElement("div");
      section.className = "section";

      const img = document.createElement("img");
      img.src = src;
      img.alt = `Página ${index + 1}`;
      img.loading = index === 0 ? "eager" : "lazy";

      section.appendChild(img);

      if (index === imagens.length - 1) {
        const btnPrecos = document.createElement("a");
        btnPrecos.className = "hotspot btn-precos";
        btnPrecos.href = "./precos.html";

        const btnWhats = document.createElement("a");
        btnWhats.className = "hotspot btn-whatsapp";
        btnWhats.href = "https://wa.me/5585985200377";
        btnWhats.target = "_blank";

        section.appendChild(btnPrecos);
        section.appendChild(btnWhats);
      }

      wrap.appendChild(section);
    });
  </script>
</body>
</html>
